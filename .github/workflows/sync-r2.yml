name: Sync data to Cloudflare R2

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "dashboard/**/*.json"
      - ".github/workflows/sync-r2.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r2-data-sync
  cancel-in-progress: true

jobs:
  sync-r2:
    runs-on: ubuntu-latest

    env:
      AWS_DEFAULT_REGION: auto
      CLOUDFLARE_R2: ${{ secrets.CLOUDFLARE_R2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load Cloudflare R2 secret
        shell: bash
        run: |
          test -n "$CLOUDFLARE_R2"

          while IFS= read -r line; do
            line="${line#export }"
            case "$line" in
              R2_ACCESS_KEY_ID=*|R2_SECRET_ACCESS_KEY=*|R2_BUCKET=*|R2_ENDPOINT=*)
                printf '%s\n' "$line" >> "$GITHUB_ENV"
                ;;
            esac
          done <<< "$CLOUDFLARE_R2"

      - name: Validate required values
        shell: bash
        run: |
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_BUCKET"
          test -n "$R2_ENDPOINT"
          echo "AWS_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          pip install awscli

      - name: Check data folder
        run: |
          test -d data
          find data -type f | head -50

      - name: Sync data folder to R2
        run: |
          aws s3 sync data "s3://${R2_BUCKET}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress \
            --cache-control "public, max-age=3600"

      - name: Publish dashboard runtime data to R2
        run: |
          if [ -f dashboard/ciclo-unico-caldo/dashboard_caldo.json ]; then
            aws s3 cp dashboard/ciclo-unico-caldo/dashboard_caldo.json \
              "s3://${R2_BUCKET}/ciclo-unico-caldo/dashboard_caldo.json" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-progress \
              --cache-control "public, max-age=3600" \
              --content-type "application/json"
          fi
